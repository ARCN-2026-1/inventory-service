name: Promote to Main

on:
  push:
    branches:
      - develop

permissions:
  contents: write
  pull-requests: write

jobs:
  open-promote-pr:
    name: Open promote PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure develop to main PR exists
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GH_REPO: ${{ github.repository }}
        run: |
          pr_number=$(gh pr list --repo "$GH_REPO" --base main --head develop --state open --json number --jq '.[0].number')

          if [ -z "$pr_number" ]; then
            gh pr create \
              --repo "$GH_REPO" \
              --base main \
              --head develop \
              --title "chore(repo): promote develop to main" \
              --body "Automated promotion PR from develop to main after a successful push to develop."
          fi
